apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: springboot-app-template
  title: Spring Boot Application with ArgoCD
  description: สร้างโปรเจกต์ Spring Boot พร้อมไฟล์ Deployment สำหรับ Minikube/ArgoCD
  tags:
    - spring-boot
    - java
    - maven
    - kubernetes
    - argocd
spec:
  type: service
  owner: user:guest
  system: microservices

  parameters:
    - title: Provide Application Information
      required:
        - application_name
        - package_name
      properties:
        application_name:
          title: Name
          type: string
          description: ชื่อ App (ควรเป็นภาษาอังกฤษตัวเล็ก เช่น my-app)
        package_name:
          title: Java Package Name
          type: string
          default: com.example.demo
          description: ชื่อ Java package (เช่น com.mbix.service)
        description:
          title: Description
          type: string
        image_name:
          title: Docker Image Name
          type: string
          description: ชื่อ Image ที่จะใช้รัน (เช่น my-registry/my-app:latest)
          default: "nginx:latest"

    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-template
      name: Fetch Template
      action: fetch:template
      input:
        url: ./app-template # ชี้ไปที่โฟลเดอร์ skeleton
        values:
          application_name: ${{ parameters.application_name }}
          description: ${{ parameters.description }}
          package_name: ${{ parameters.package_name }}
          image_name: ${{ parameters.image_name }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: "Spring Boot app: ${{ parameters.application_name }}"
        defaultBranch: 'main'

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    - id: create-argocd-resources
      name: Create ArgoCD Resources
      action: argocd:create-resources
      input:
        appName: ${{ parameters.application_name }}
        argoInstance: main
        projectName: default
        namespace: ${{ parameters.namespace }}
        repoUrl: https://github.com/${{ parameters.repoUrl | parseRepoUrl | get('owner') }}/${{ parameters.repoUrl | parseRepoUrl | get('repo') }}.git
        path: 'k8s'
        destinationServer: https://kubernetes.default.svc
        destinationNamespace: demo
        
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}