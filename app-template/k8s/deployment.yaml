apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.application_name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.application_name }}
  template:
    metadata:
      labels:
        app: ${{ values.application_name }}
    spec:
      containers:
      - name: spring-app
        image: ${{ values.image_name }}
        ports:
        - containerPort: 8080
        # ใช้ Actuator เช็คว่าแอปตายไหม
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.application_name }}
spec:
  type: NodePort
  selector:
    app: ${{ values.application_name }}
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080 # เลือกเลข port ให้ Minikube (30000-32767)