name: Build and Push

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ใช้ Action มาตรฐานแทนการรัน shell command ตรงๆ เพื่อความปลอดภัย
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ตั้งค่า Docker Buildx (ช่วยให้ build เร็วขึ้นและรองรับฟีเจอร์ใหม่ๆ)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ขั้นตอน Build และ Push ในตัวเดียว (ลดความซ้ำซ้อน)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # แปลงชื่อ repository ให้เป็นตัวเล็กเสมอ (GHCR บังคับตัวเล็ก)
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest