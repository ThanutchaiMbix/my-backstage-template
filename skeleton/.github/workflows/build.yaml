name: Build and Push

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ต้องรันขั้นตอนนี้ก่อน เพื่อสร้างตัวแปร IMAGE_NAME ที่เป็นตัวเล็กทั้งหมด
      - name: Set Image Name to Lowercase
        run: |
          # แปลงชื่อ User/Repo ให้เป็นตัวเล็กแล้วเก็บไว้ในระบบ Environment ของ GitHub
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. Login เข้า GHCR (ใช้ Action มาตรฐาน)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build และ Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ดึงค่า IMAGE_NAME ที่เราตั้งไว้ใน Step แรกมาใช้ผ่าน env.
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest