apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.application_name }}
  labels:
    app: ${{ values.application_name }}
    backstage.io/kubernetes-id: ${{ values.application_name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.application_name }}
  template:
    metadata:
      labels:
        app: ${{ values.application_name }}
        backstage.io/kubernetes-id: ${{ values.application_name }}
    spec:
      containers:
        - name: ${{ values.application_name }}
          image: my-java-app:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: APPLICATION_NAME
              value: "${{ values.application_name }}"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.application_name }}
  labels:
    app: ${{ values.application_name }}
spec:
  type: NodePort
  selector:
    app: ${{ values.application_name }}
  ports:
    - port: 80
      targetPort: 8080